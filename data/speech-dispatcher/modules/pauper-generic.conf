# Speech Dispatcher generic module for pauper.
# Use with:
#   AddModule "pauper" "sd_generic" "pauper-generic.conf"
#   DefaultModule pauper

Debug 0

GenericPunctNone ""
GenericPunctSome "--punct=\"()[]{};:\""
GenericPunctMost "--punct=\"()[]{};:\""
GenericPunctAll "--punct"

AddVoice "en" "MALE1" "pauper"
DefaultVoice "pauper"

GenericExecuteSynth "env DATA="\"$DATA\"" VOICE="\"$VOICE\"" /usr/bin/pauper-cli speak --play"
GenericCmdDependency "pauper-cli"
GenericDefaultCharset "utf-8"
